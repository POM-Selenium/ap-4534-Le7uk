{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h2>Edit Return Date</h2>
    <p class="text-muted">Book: <strong>{{ order.book.name }}</strong></p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold">New Return Date *</label>
            {{ form.plated_end_at }}
            {% if form.plated_end_at.errors %}
                <div class="text-danger small mt-1">{{ form.plated_end_at.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/orders/my/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
